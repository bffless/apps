name: Deploy Studio to BFFless

# One workflow per app: pushes that touch apps/studio (or this file) deploy Studio,
# and it can always be run by hand. Clone the monorepo, set BFFLESS_URL +
# BFFLESS_API_KEY on your fork, and deploy just this app.
on:
  push:
    branches: [main]
    paths:
      - 'apps/studio/**'
      - '.github/workflows/deploy-studio.yml'
  workflow_dispatch:

concurrency:
  group: deploy-studio
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter studio build

      - name: Run unit tests
        run: pnpm --filter studio test:run

      - name: Deploy to BFFless
        uses: bffless/upload-artifact@v1
        with:
          path: apps/studio/dist
          api-url: ${{ vars.BFFLESS_URL }}
          api-key: ${{ secrets.BFFLESS_API_KEY }}
          alias: studio
